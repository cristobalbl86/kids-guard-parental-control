<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 646 250" width="646" height="250">
  <rect width="646" height="250" rx="20" fill="#000"/>
  <rect x="3" y="3" width="640" height="244" rx="18" fill="#000" stroke="#a6a6a6" stroke-width="2"/>
  <!-- Play triangle -->
  <g transform="translate(50, 50)">
    <defs>
      <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#00C4FF"/>
        <stop offset="25%" style="stop-color:#00F076"/>
        <stop offset="50%" style="stop-color:#FFBC00"/>
        <stop offset="100%" style="stop-color:#FF3A44"/>
      </linearGradient>
    </defs>
    <path d="M10,5 L10,145 L115,75 Z" fill="url(#playGrad)"/>
    <path d="M10,5 L65,75 L10,145 Z" fill="#00C4FF" opacity="0.8"/>
    <path d="M10,5 L65,75 L115,30 Z" fill="#00F076" opacity="0.8"/>
    <path d="M115,75 L65,75 L115,120 Z" fill="#FFBC00" opacity="0.8"/>
    <path d="M10,145 L65,75 L115,120 Z" fill="#FF3A44" opacity="0.8"/>
  </g>
  <!-- Text -->
  <text x="195" y="95" fill="#fff" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="28" font-weight="400" letter-spacing="1.5">GET IT ON</text>
  <text x="195" y="170" fill="#fff" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="60" font-weight="700" letter-spacing="0.5">Google Play</text>
</svg>
